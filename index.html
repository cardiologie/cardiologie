<!-- Web app manifest, inlined as a data URI so the whole app is one file -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Cardiologie%22%2C%22short_name%22%3A%22Cardiologie%22%2C%22description%22%3A%22Guide%20d%C3%A9cisionnel%20de%20cardiologie%20-%20ESC%2FEACTS%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F2EBDF%22%2C%22theme_color%22%3A%22%23F2EBDF%22%2C%22orientation%22%3A%22portrait%22%7D">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:#F2EBDF; overscroll-behavior-y: none; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  /* Respect iOS safe areas (notch / home indicator) when running standalone */
  #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); min-height: 100vh; }
  ::-webkit-scrollbar { display: none; }
</style>

<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#7A6F5C;font-size:14px;">
    Chargement…
  </div>
</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="app_component_compiled.js"></script>
<script>
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));

  // Register a minimal service worker for offline support once installed
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'cardiologie-v1';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(cache => cache.addAll([
            './',
            './app_component_compiled.js',
            'https://unpkg.com/react@18/umd/react.production.min.js',
            'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'
          ])).catch(()=>{})
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', e => self.clients.claim());
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
            const copy = resp.clone();
            caches.open(CACHE).then(cache => cache.put(e.request, copy));
            return resp;
          }).catch(() => cached))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
</script>
</body>
