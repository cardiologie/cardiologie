<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Cardiologie</title>

<!-- ── PWA / iOS install metadata ── -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cardiologie">
<meta name="theme-color" content="#F2EBDF">
<meta name="mobile-web-app-capable" content="yes">

<!-- App icon — real PNG files (required for iOS home-screen icon) -->
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- Web app manifest as a separate file so it can reference the PNG icons -->
<link rel="manifest" href="manifest.webmanifest">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:#F2EBDF; overscroll-behavior-y: none; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  /* Respect iOS safe areas (notch / home indicator) when running standalone */
  #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); min-height: 100vh; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#7A6F5C;font-size:14px;">
    Chargement…
  </div>
</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="app_component_compiled.js"></script>
<script>
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));

  // Register a minimal service worker for offline support once installed
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'cardiologie-v2';
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open(CACHE).then(cache => cache.addAll([
            './',
            './app_component_compiled.js',
            './manifest.webmanifest',
            './icon-180.png',
            './icon-192.png',
            './icon-512.png',
            'https://unpkg.com/react@18/umd/react.production.min.js',
            'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'
          ])).catch(()=>{})
        );
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(
          caches.keys().then(keys => Promise.all(
            keys.filter(k => k !== CACHE).map(k => caches.delete(k))
          )).then(() => self.clients.claim())
        );
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(cached => cached || fetch(e.request).then(resp => {
            const copy = resp.clone();
            caches.open(CACHE).then(cache => cache.put(e.request, copy));
            return resp;
          }).catch(() => cached))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
</script>
</body>
</html>
